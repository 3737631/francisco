<header class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;">
      <a href="/" class="header__logo" aria-label="Francisco">
        <svg role="presentation" width="35" height="35" viewBox="0 0 35 35" fill="none">
          <circle cx="17.5" cy="17.5" r="16.5" stroke="currentColor" stroke-width="2"/>
          <text x="50%" y="54%" text-anchor="middle" fill="currentColor" font-size="18" font-weight="400" font-family="SangBleuEmpire,Georgia,serif" dominant-baseline="middle">F</text>
        </svg>
      </a>
      <span class="section-label header__title">__SECTION__</span>
    </div>
    <div class="header__menu-outer">
      <div class="lang-switcher">
        <button id="lang-btn" aria-label="Cambiar idioma">
          <span>es</span>
          <svg id="lang-arrow" class="arrow" viewBox="0 0 13 7" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1.5 1.5l5 4 5-4"/>
          </svg>
        </button>
        <ul id="lang-list" class="lang-list">
          <li><a href="/" class="active">es</a></li>
          <li><a href="/en">en</a></li>
        </ul>
      </div>
      <button id="menu-trigger" class="mega-menu__trigger" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
